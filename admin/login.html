<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Liberté Psicologia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-cinza-nevoa">

    <div class="bg-branco-puro p-10 rounded-3xl shadow-float max-w-md w-full border border-white mx-4 hover-float transition-slow">
        <div class="text-center mb-10">
            <a href="../index.html" class="inline-flex items-center gap-2 mb-6">
                <img src="../img/Logo.png" alt="Liberté Psicologia Logo" class="h-14">
            </a>
            <h1 class="text-2xl font-bold text-ceu-noturno font-heading">Bem-vindo(a)</h1>
            <p class="text-gray-500 font-light mt-1">Acesse seu painel administrativo</p>
        </div>

        <!-- Mensagem de erro -->
        <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm font-medium">
            <i class="fa-solid fa-circle-exclamation mr-2"></i>
            <span id="error-text"></span>
        </div>

        <form id="login-form">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-600 mb-2">E-mail</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="email" id="email" class="w-full bg-cinza-nevoa border-none rounded-xl pl-12 pr-4 py-3 focus:ring-2 focus:ring-azul-serena outline-none" placeholder="admin@liberte.com" required>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-2">Senha</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="password" id="senha" class="w-full bg-cinza-nevoa border-none rounded-xl pl-12 pr-4 py-3 focus:ring-2 focus:ring-azul-serena outline-none" placeholder="******" required>
                </div>
            </div>

            <div class="flex items-center justify-between mb-8">
                <label class="flex items-center gap-2 cursor-pointer text-sm">
                    <input type="checkbox" class="text-azul-serena focus:ring-azul-serena rounded border-gray-300">
                    <span class="text-gray-600">Lembrar-me</span>
                </label>
                <a href="#" class="text-sm font-bold text-azul-serena hover:underline">Esqueceu a senha?</a>
            </div>

            <button type="submit" id="btn-login" class="w-full bg-azul-serena text-branco-puro py-4 rounded-xl font-bold shadow-soft hover:bg-opacity-90 transition-all hover:-translate-y-1 flex items-center justify-center gap-2">
                <span id="btn-text">Entrar</span>
                <i id="btn-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
            </button>
        </form>
        
        <p class="text-center text-sm text-gray-400 mt-8">
            Admin padrão: <strong>admin@liberte.com</strong> / <strong>admin123</strong>
        </p>
    </div>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const errorDiv = document.getElementById('login-error');
            const errorText = document.getElementById('error-text');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnLogin = document.getElementById('btn-login');

            // Esconde erro anterior
            errorDiv.classList.add('hidden');

            // Mostra loading
            btnLogin.disabled = true;
            btnText.textContent = 'Entrando...';
            btnSpinner.classList.remove('hidden');

            try {
                await loginUser(email, senha);
                window.location.href = 'painel.html';
            } catch (err) {
                errorText.textContent = err.message;
                errorDiv.classList.remove('hidden');
                btnLogin.disabled = false;
                btnText.textContent = 'Entrar';
                btnSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
